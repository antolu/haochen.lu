name: Build and Push App Image

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

env:
  REGISTRY: docker.io
  IMAGE_APP: antonlu/arcadia-app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Fetch all history for setuptools-scm to detect version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_TAG="${RAW_TAG#v}"
          echo "raw_tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate backend package version tag
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import sys

          try:
            from packaging.version import InvalidVersion, Version
          except Exception:
            print("packaging is required on the runner but is not available.")
            sys.exit(1)

          version_tag = os.environ["VERSION_TAG"]
          try:
            Version(version_tag)
          except InvalidVersion:
            print(f"Invalid PEP 440 version for backend build: {version_tag}")
            print("Use tags like v1.2.3, v1.2.3rc1, or v1.2.3.dev1")
            sys.exit(1)
          PY
        env:
          VERSION_TAG: ${{ steps.vars.outputs.version_tag }}

      - name: Build and push app image (multi-arch)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BUILD_TYPE=production \
            --file docker/Dockerfile \
            --tag antonlu/arcadia-app:latest \
            --tag antonlu/arcadia-app:${{ steps.vars.outputs.version_tag }} \
            --push \
            .

      - name: Summary
        run: |
          echo "## Image Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Source git tag: ${{ steps.vars.outputs.raw_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Published image tag: ${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/arcadia-app:latest" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/arcadia-app:${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
