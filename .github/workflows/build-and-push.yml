name: Build and Push Multi-Platform Images

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

env:
  REGISTRY: docker.io
  IMAGE_FRONTEND: antonlu/arcadia-frontend
  IMAGE_BACKEND: antonlu/arcadia-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for setuptools-scm to detect version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_TAG="${RAW_TAG#v}"
          echo "raw_tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image (multi-arch)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BUILD_TYPE=production \
            --file backend/Dockerfile \
            --tag antonlu/arcadia-backend:latest \
            --tag antonlu/arcadia-backend:${{ steps.vars.outputs.version_tag }} \
            --push \
            .

      - name: Build and push frontend image (multi-arch)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file frontend/Dockerfile \
            --tag antonlu/arcadia-frontend:latest \
            --tag antonlu/arcadia-frontend:${{ steps.vars.outputs.version_tag }} \
            --push \
            frontend

      - name: Summary
        run: |
          echo "## Images Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Source git tag: ${{ steps.vars.outputs.raw_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Published image tag: ${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/arcadia-frontend:latest" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/arcadia-frontend:${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/arcadia-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/arcadia-backend:${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
