name: Pre-commit CI Lite

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ master ]

permissions:
  contents: write

jobs:
  pre-commit-ci-lite:
    # Only run on labeled trigger or standard triggers
    if: "github.event.action != 'labeled' || github.event.label.name == 'pre-commit ci run'"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Remove label if present
      if: github.event.action == 'labeled' && github.event.label.name == 'pre-commit ci run'
      run: gh pr edit ${{ github.event.number }} --remove-label 'pre-commit ci run'
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies (Backend)
      run: |
        cd backend
        pip install -e ".[test]"

    - name: Install dependencies (Frontend)
      run: |
        cd frontend
        npm ci

    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1

    - name: Run Backend Linting (ruff)
      if: always()
      run: |
        ruff check --config backend/pyproject.toml --output-format=github backend/
        ruff format --config backend/pyproject.toml --check backend/

    - name: Run Backend Type Checking (mypy)
      if: always()
      run: |
        mypy --config-file backend/pyproject.toml backend/app/

    - name: Run Frontend Linting (ESLint)
      if: always()
      run: |
        cd frontend
        npm run lint

    - name: Run Frontend Type Checking (tsc)
      if: always()
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Pre-commit CI Lite Auto-fix
      uses: pre-commit-ci/lite-action@v1.1.0
      if: always()
