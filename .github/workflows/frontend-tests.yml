name: Frontend Tests

on:
  push:
    branches: [ master, feat/v2 ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ master, feat/v2 ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24, 25]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run lint check
      run: |
        cd frontend
        npm run lint

    - name: Run TypeScript type check
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run P0 UI Security Tests
      run: |
        cd frontend
        npm run test:security -- --run --reporter=verbose

    - name: Run P1 Component Tests
      run: |
        cd frontend
        npm run test:components -- --run --reporter=verbose

    - name: Run all unit tests with coverage
      run: |
        cd frontend
        npm run test:coverage -- --run

    # - name: Upload coverage to Codecov
    #   uses: codecov/codecov-action@v3
    #   with:
    #     file: ./frontend/coverage/lcov.info
    #     flags: frontend
    #     name: frontend-coverage
    #     fail_ci_if_error: true

    - name: Build application
      run: |
        cd frontend
        npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: frontend-build-${{ matrix.node-version }}
        path: frontend/dist

  accessibility-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 20
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Build application
      run: |
        cd frontend
        npm run build

    - name: Serve application
      run: |
        cd frontend
        npx serve -s dist -l tcp://127.0.0.1:3000 > /tmp/frontend-accessibility-serve.log 2>&1 &
        ready=0
        for i in {1..60}; do
          if curl -fsS http://127.0.0.1:3000 > /dev/null; then
            ready=1
            break
          fi
          sleep 1
        done
        if [ "$ready" -ne 1 ]; then
          echo "Frontend app did not become ready in time"
          cat /tmp/frontend-accessibility-serve.log
          exit 1
        fi

    - name: Install accessibility tools
      run: |
        npm install -g @axe-core/cli lighthouse browser-driver-manager

    - name: Install matching Chrome and ChromeDriver
      run: |
        npx browser-driver-manager install chrome

    - name: Run axe accessibility tests
      run: |
        axe http://127.0.0.1:3000 --tags wcag2a,wcag2aa --save axe-results.json

    - name: Verify page serves HTML content
      run: |
        content=$(curl -fsS http://127.0.0.1:3000)
        if ! echo "$content" | grep -q "<html"; then
          echo "Error: Page did not return HTML content"
          echo "$content"
          exit 1
        fi
        echo "✓ Page serves HTML content"

    - name: Run Lighthouse accessibility audit
      run: |
        CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium)"
        if [ -z "$CHROME_BIN" ]; then
          echo "No Chrome/Chromium binary found on runner"
          exit 1
        fi
        lighthouse http://127.0.0.1:3000 \
          --only-categories=accessibility \
          --output json \
          --output-path lighthouse-accessibility.json \
          --max-wait-for-load=60000 \
          --throttling-method=provided \
          --disable-storage-reset \
          --emulated-form-factor=desktop \
          --chrome-path="$CHROME_BIN" \
          --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu --window-size=1920,1080"

    - name: Upload accessibility reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: accessibility-reports
        path: |
          axe-results.json
          lighthouse-accessibility.json

  performance-audit:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 20
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Build application
      run: |
        cd frontend
        npm run build

    - name: Analyze bundle size
      run: |
        cd frontend
        node scripts/generate-bundle-report.js bundle-size-report.json

    - name: Start application
      run: |
        cd frontend
        npx serve -s dist -l tcp://127.0.0.1:3000 > /tmp/frontend-performance-serve.log 2>&1 &
        ready=0
        for i in {1..60}; do
          if curl -fsS http://127.0.0.1:3000 > /dev/null; then
            ready=1
            break
          fi
          sleep 1
        done
        if [ "$ready" -ne 1 ]; then
          echo "Frontend app did not become ready in time"
          cat /tmp/frontend-performance-serve.log
          exit 1
        fi

    - name: Install Lighthouse
      run: npm install -g lighthouse

    - name: Verify page serves HTML content
      run: |
        content=$(curl -fsS http://127.0.0.1:3000)
        if ! echo "$content" | grep -q "<html"; then
          echo "Error: Page did not return HTML content"
          echo "$content"
          exit 1
        fi
        echo "✓ Page serves HTML content"

    - name: Run Lighthouse performance audit
      continue-on-error: true  # Lighthouse in CI can be flaky
      run: |
        CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium)"
        if [ -z "$CHROME_BIN" ]; then
          echo "No Chrome/Chromium binary found on runner"
          exit 1
        fi
        lighthouse http://127.0.0.1:3000 \
          --only-categories=performance \
          --output json \
          --output html \
          --output-path lighthouse-performance \
          --max-wait-for-load=60000 \
          --throttling-method=provided \
          --disable-storage-reset \
          --emulated-form-factor=desktop \
          --chrome-path="$CHROME_BIN" \
          --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu --window-size=1920,1080"

    - name: Check bundle size limits
      run: |
        cd frontend
        node -e "
        const fs = require('fs');
        const report = JSON.parse(fs.readFileSync('bundle-size-report.json', 'utf8'));
        const totalSize = report.reduce((acc, asset) => acc + (asset.gzipSize || asset.statSize), 0);
        const maxSize = 1.5 * 1024 * 1024; // 1.5MB gzipped limit

        console.log(\`Total bundle size (gzipped): \${(totalSize / 1024).toFixed(2)} KB\`);

        if (totalSize > maxSize) {
          console.error(\`Bundle size (gzipped) \${(totalSize / 1024).toFixed(2)} KB exceeds limit of \${(maxSize / 1024).toFixed(0)} KB\`);
          process.exit(1);
        }
        "

    - name: Upload performance reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: performance-reports
        path: |
          frontend/bundle-size-report.json
          lighthouse-performance.json
          lighthouse-performance.html
