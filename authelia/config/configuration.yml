server:
  address: 'tcp://0.0.0.0:9091/'

log:
  level: info

theme: dark

totp:
  issuer: homelab

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id

access_control:
  ## Default 2FA method.
  ## Options are 'totp', 'webauthn', 'mobile_push'.
  default_2fa_method: ""
  default_policy: deny
  rules:
    - domain: "auth.localhost"
      policy: bypass
    - domain: "localhost"
      policy: two_factor
      subject:
        - "user:anton"

session:
  cookies:
    - domain: 'localhost'
      authelia_url: 'http://auth.localhost'
      expiration: 12h
      inactivity: 45m

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

identity_providers:
  oidc:
    hmac_secret_file: /config/secrets/oidc_hmac
    issuer_private_key_file: /config/secrets/oidc_issuer_key.pem
    clients:
      - client_id: arcadia-client
        client_name: "Arcadia"
        client_secret: '$pbkdf2-sha512$310000$j.vliqBxrp1BBOzN12KAMg$svpTE4gtX2vmmn7w3YVAS5OpXxkz56wM8P723iMrZifH02GCl5ztfUnhWM0rPZxPTJkX7kAx3pQuSpmooOlgug'
        # Authelia OIDC client secrets can be plaintext if they don't start with $ digest.
        # Actually, let's use a simple one for now.
        authorization_policy: two_factor
        redirect_uris:
          - http://localhost/api/auth/callback
        scopes:
          - openid
          - profile
          - email
          - groups
        grant_types:
          - authorization_code
          - refresh_token
        response_types:
          - code
