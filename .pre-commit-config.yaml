exclude: ^(.idea|node_modules|dist|build|coverage|\.next|\.nuxt)
repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=10240']
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-json
      - id: debug-statements
        exclude: ^LICENSE|\.(html|csv|txt|svg|py)$
      - id: requirements-txt-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: \.(html|svg|md)$
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --unsafe-fixes, --preview, --config=backend/pyproject.toml]
        files: ^backend/
        exclude: ^backend/app/_version\.py$
      - id: ruff-format
        args: [--config=backend/pyproject.toml]
        files: ^backend/
        exclude: ^backend/app/_version\.py$

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: ^backend/
        exclude: ^backend/(tests/.*|alembic/.*|app/_version\.py)$
        args: [--config-file=backend/pyproject.toml]
        additional_dependencies:
          - 'pydantic>=2.12.5'
          - 'pydantic-settings>=2.13.1'
          - 'sqlalchemy[mypy]>=2.0.48'
          - 'types-PyYAML'
          - 'types-redis>=4.6.0.20241004'
          - 'httpx>=0.28.1'
          - 'fastapi>=0.135.2'
          - 'starlette>=1.0.0'
          - 'bcrypt>=5.0.0'

  # ESLint for TypeScript/JavaScript linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.1.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(ts|tsx|js|jsx)$  # Explicitly match TypeScript and JavaScript files
        exclude: ^frontend/(node_modules|dist|build|coverage|\.next|\.nuxt|\.vite)/
        types: [file]
        args: [--fix, --config, frontend/eslint.config.js]
        additional_dependencies:
          - eslint@10.1.0
          - '@eslint/js@10.0.1'
          - 'typescript-eslint@8.57.2'
          - 'eslint-plugin-react-hooks@7.0.1'
          - 'eslint-plugin-react-refresh@0.5.2'
          - 'globals@17.4.0'
          - 'typescript@6.0.2'

  # Prettier for code formatting
  - repo: https://github.com/mirrors-prettier/mirrors-prettier
    rev: v4.0.0-alpha.13
    hooks:
      - id: prettier
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|scss|md|yaml|yml)$
        exclude: ^frontend/(dist|build|coverage|node_modules)/

  # Docker linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Security checks for Python
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        files: ^backend/
        exclude: ^backend/(tests/|app/_version\.py$)

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-d, relaxed]
        files: \.(yaml|yml)$
