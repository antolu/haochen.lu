# Development environment with live reload and nginx proxy
# Usage: ./dev.sh start
# This will mount source code, run development servers, and proxy through nginx

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: antonlu/arcadia-app:dev
    container_name: portfolio-app-dev
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.vite
      - ./uploads:/app/uploads
      - ./compressed:/app/compressed
      - ./file_uploads:/app/file_uploads
      - ./.git:/app/.git
    environment:
      - ENVIRONMENT=development
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=http://localhost,https://localhost,http://localhost:6001
      - COOKIE_SECURE=false
      - COOKIE_DOMAIN=
      - WEBP_QUALITY=85
      - THUMBNAIL_SIZE=400
      - MAX_FILE_SIZE=52428800
      - FILE_UPLOAD_DIR=/app/file_uploads
      - OIDC_ENDPOINT=http://keycloak:8080
      - OIDC_PUBLIC_ENDPOINT=http://localhost:9091
      - OIDC_REALM=arcadia
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-haochen-lu}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=http://localhost/api/auth/callback
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WORKDIR=/app/backend
    depends_on:
      - db
      - redis
      - keycloak
    networks:
      portfolio-network:
      first-party-auth-network:
        aliases:
          - auth-broker

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6380:6379"
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: keycloak/keycloak:26.6.1
    container_name: keycloak
    command: start-dev --import-realm
    volumes:
      - ./keycloak/arcadia-realm.json:/opt/keycloak/data/import/arcadia-realm.json:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      KC_HOSTNAME: http://localhost:9091
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "9091:8080"
    networks:
      - portfolio-network
      - first-party-auth-network
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

networks:
  portfolio-network:
    driver: bridge
  first-party-auth-network:
    driver: bridge
    name: first-party-auth-network
