# Development environment with live reload and nginx proxy
# Usage: ./dev.sh start
# This will mount source code, run development servers, and proxy through nginx

services:
  nginx:
    # Use the same nginx config but proxy to dev servers
    build:
      context: ./frontend
      dockerfile: Dockerfile.nginx.dev
    image: antonlu/arcadia-nginx:dev
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
      - keycloak
    networks:
      - portfolio-network

  backend:
    # Override the image to use a development base
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BUILD_TYPE: development
    image: antonlu/arcadia-backend:dev
    volumes:
      # Mount source code for live reload
      - ./backend:/app
      - ./.git:/app/.git
      - ./uploads:/app/uploads
      - ./compressed:/app/compressed
      # Preserve build artifacts
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-portfolio}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=http://localhost,https://localhost,http://localhost:6001
      - COOKIE_SECURE=false
      - COOKIE_DOMAIN=
      - WEBP_QUALITY=85
      - THUMBNAIL_SIZE=400
      - MAX_FILE_SIZE=52428800
      - OIDC_ENDPOINT=http://keycloak:8080
      - OIDC_PUBLIC_ENDPOINT=http://localhost:9091
      - OIDC_REALM=arcadia
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-arcadia-client}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=http://localhost/api/auth/callback
    command:
      - "uvicorn"
      - "app.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--reload"
      - "--reload-dir"
      - "/app"
    ports:
      - "8000:8000"  # Expose backend directly for debugging
    depends_on:
      - db
      - redis
    networks:
      portfolio-network:
      first-party-auth-network:
        aliases:
          - auth-broker

  frontend:
    # Override the image to use a development base
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: antonlu/arcadia-frontend:dev
    volumes:
      # Mount source code for live reload
      - ./frontend:/app
      # Preserve node_modules
      - /app/node_modules
      # Preserve build cache
      - /app/.vite
    environment:
      - NODE_ENV=development
      - VITE_API_URL=/api  # Use relative URLs since nginx will proxy
      - CHOKIDAR_USEPOLLING=true  # For Docker file watching
    command:
      - "npm"
      - "run"
      - "dev"
      - "--"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "3000"
    depends_on:
      - backend
    networks:
      - portfolio-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: keycloak/keycloak:26.6.1
    container_name: keycloak
    command: start-dev --import-realm
    volumes:
      - ./keycloak/arcadia-realm.json:/opt/keycloak/data/import/arcadia-realm.json:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HOSTNAME: http://localhost:9091
      KC_HOSTNAME_STRICT: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "9091:8080"
    networks:
      - portfolio-network
      - first-party-auth-network
    depends_on:
      keycloak-db:
        condition: service_healthy

  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  keycloak_db_data:

networks:
  portfolio-network:
    driver: bridge
  first-party-auth-network:
    driver: bridge
    name: first-party-auth-network
